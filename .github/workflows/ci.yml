name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  core:
    name: Core Module
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - run: go test ./... -count=1 -race
      - run: go vet ./...

  hegel:
    name: Hegel Module
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - uses: astral-sh/setup-uv@v6
      - run: uv tool install hegel-core
      - run: go test github.com/franchb/fptest/hegel/... -count=1 -race
      - run: cd hegel && go vet ./...
